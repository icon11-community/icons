<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Over 0 icons Folder11 for Windows</title>
    <link rel="icon" href="https://raw.githubusercontent.com/icon11-community/Folder-Ico/main/ico/folder11.ico">
    
    <style>
        /* Windows 11 Light Mode Variables (Default) */
        :root {
            --bg-color: #faf9f8;
            --text-color: #242424;
            --secondary-text-color: #5d5d5d;
            
            /* Fluent UI Materials */
            --card-bg-color: rgba(255, 255, 255, 0.7);
            --card-border-color: rgba(0, 0, 0, 0.05);
            --control-bg-color: rgba(255, 255, 255, 0.9);
            --control-border-color: rgba(0, 0, 0, 0.1);
            
            /* Overlay Blur Variables */
            --overlay-bg: rgba(255, 255, 255, 0.7);
            --header-blur-bg: rgba(250, 249, 248, 0.85);
            
            /* Dialog Variables */
            --dialog-bg: #ffffff;
            --dialog-footer-bg: #f3f2f1;
            --dialog-border: rgba(0, 0, 0, 0.05);
            
            /* Combobox Dropdown Variables */
            --dropdown-bg: #ffffff;
            --dropdown-border: rgba(0, 0, 0, 0.1);
            
            /* Accents */
            --accent-color: #005fb8;
            --accent-text-color: #ffffff;
            --accent-hover: #00529e;
            
            /* States */
            --hover-color: rgba(0, 0, 0, 0.04);
            --active-color: rgba(0, 0, 0, 0.08);
            
            /* Shadows & Skeletons */
            --shadow-subtle: 0 2px 4px rgba(0, 0, 0, 0.04), 0 8px 16px rgba(0, 0, 0, 0.04);
            --shadow-flyout: 0 8px 16px rgba(0, 0, 0, 0.14);
            --shadow-dialog: 0 32px 64px rgba(0,0,0,0.2);
            --skeleton-light: #e0e0e0;
            --skeleton-dark: #f0f0f0;
            
            /* Selection */
            --selection-bg: rgba(0, 95, 184, 0.1);
            --selection-border: var(--accent-color);
        }

        /* Windows 11 Dark Mode Variables */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #202020;
                --text-color: #ffffff;
                --secondary-text-color: #a0a0a0;
                
                --card-bg-color: rgba(255, 255, 255, 0.05);
                --card-border-color: rgba(255, 255, 255, 0.08);
                --control-bg-color: rgba(255, 255, 255, 0.06);
                --control-border-color: rgba(255, 255, 255, 0.1);
                
                --overlay-bg: rgba(32, 32, 32, 0.75);
                --header-blur-bg: rgba(32, 32, 32, 0.85);
                
                --dialog-bg: #2c2c2c;
                --dialog-footer-bg: #202020;
                --dialog-border: rgba(255, 255, 255, 0.08);
                
                --dropdown-bg: #2c2c2c;
                --dropdown-border: rgba(255, 255, 255, 0.08);
                
                --accent-color: #60cdff;
                --accent-text-color: #000000;
                --accent-hover: #58bbf5;
                
                --hover-color: rgba(255, 255, 255, 0.06);
                --active-color: rgba(255, 255, 255, 0.09);
                
                --shadow-subtle: 0 4px 8px rgba(0, 0, 0, 0.15), 0 8px 16px rgba(0, 0, 0, 0.15);
                --shadow-flyout: 0 8px 16px rgba(0, 0, 0, 0.28);
                --shadow-dialog: 0 32px 64px rgba(0,0,0,0.4);
                --skeleton-light: #333;
                --skeleton-dark: #222;
                
                --selection-bg: rgba(96, 205, 255, 0.1);
                --selection-border: var(--accent-color);
            }
        }

        body {
            font-family: 'Segoe UI Variable Text', 'Segoe UI Variable Display', 'Segoe UI', Tahoma, Geneva, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        h1, h2, h3, .fluent-dialog-title, .icon-name {
            font-family: 'Segoe UI Variable Display', 'Segoe UI', Tahoma, Geneva, sans-serif;
        }

        /* --- APP LAYOUT (SIDEBAR + MAIN CONTENT) --- */
        .app-container { display: flex; min-height: 100vh; }

        /* --- SIDEBAR STYLES --- */
        .sidebar {
            width: 260px; flex-shrink: 0; border-right: 1px solid var(--card-border-color);
            height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column;
            background-color: var(--bg-color); z-index: 200;
        }

        .sidebar-header { padding: 24px 20px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid transparent; }
        .sidebar-title { font-weight: 600; font-size: 16px; margin: 0; color: var(--text-color); }

        .github-logo-btn {
            text-decoration: none; color: var(--text-color); display: flex; align-items: center; justify-content: center;
            background-color: var(--control-bg-color); border: 1px solid var(--control-border-color);
            border-radius: 8px; width: 36px; height: 36px; box-shadow: var(--shadow-subtle); transition: background-color 0.2s ease; flex-shrink: 0;
        }
        .github-logo-btn:hover { background-color: var(--hover-color); }
        .github-logo-btn:active { background-color: var(--active-color); transform: scale(0.96); }

        .sidebar-menu { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 2px; }

        /* Custom Scrollbar for Sidebar */
        .sidebar-menu::-webkit-scrollbar { width: 4px; }
        .sidebar-menu::-webkit-scrollbar-track { background: transparent; }
        .sidebar-menu::-webkit-scrollbar-thumb { background-color: transparent; border-radius: 4px; }
        .sidebar-menu:hover::-webkit-scrollbar-thumb { background-color: var(--control-border-color); }
        .sidebar-menu::-webkit-scrollbar-thumb:hover { background-color: var(--secondary-text-color); }

        /* Fluent Nav Item Style (Base) */
        .sidebar-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; border-radius: 6px; cursor: pointer;
            transition: background-color 0.15s ease; position: relative; color: var(--text-color);
        }
        .sidebar-item:hover { background-color: var(--hover-color); }
        .sidebar-item:active { background-color: var(--active-color); }
        
        /* Active State with Blue Pill */
        .sidebar-item.active { background-color: var(--hover-color); font-weight: 600; }
        .sidebar-item.active::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 16px; background-color: var(--accent-color); border-radius: 4px;
        }

        .sidebar-item-text { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; flex: 1; }
        .sidebar-badge {
            background: var(--control-bg-color); border: 1px solid var(--control-border-color);
            border-radius: 12px; padding: 2px 8px; font-size: 11px; font-weight: 600; color: var(--secondary-text-color);
        }

        /* --- ACCORDION / FOLDER SECTION STYLES --- */
        .sidebar-section { margin-top: 8px; }
        .sidebar-section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; user-select: none;
            color: var(--text-color); transition: background-color 0.15s ease;
        }
        .sidebar-section-header:hover { background-color: var(--hover-color); }
        
        .sidebar-section-header-left { display: flex; align-items: center; gap: 10px; }
        .sidebar-label { font-size: 14px; font-weight: 600; margin: 0; padding: 0; }
        
        /* Arrow Chevron Styles */
        .section-arrow { transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1); color: var(--secondary-text-color); }
        /* Default: menghadap bawah. Jika OPEN: menghadap atas ^ */
        .section-arrow { transform: rotate(0deg); } 
        .section-arrow.open { transform: rotate(180deg); }

        .sidebar-section-content {
            display: flex; flex-direction: column; gap: 2px;
            padding-left: 20px; /* Indentasi ke dalam pengganti garis konektor */
            margin-top: 2px;
            overflow: hidden;
        }
        .sidebar-section-content.collapsed { display: none; }

        /* --- MAIN CONTENT & STICKY HEADER --- */
        .main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }

        .sticky-header {
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px; background-color: var(--header-blur-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border-color); gap: 16px;
        }

        .header-left-controls { display: flex; align-items: center; gap: 12px; flex: 1; max-width: 600px; }

        /* --- SEARCH & COMBOBOX --- */
        #search-container {
            display: flex; align-items: center; width: 100%;
            background-color: var(--control-bg-color); border: 1px solid var(--control-border-color);
            border-bottom: 1px solid var(--control-border-color); border-radius: 4px; box-shadow: var(--shadow-subtle);
            position: relative; transition: border-bottom-color 0.2s ease;
        }

        #search-container.focus-within { border-bottom: 2px solid var(--accent-color); padding-bottom: -1px; }
        #search-bar { flex: 1; padding: 8px 12px; background: transparent; border: none; color: var(--text-color); font-size: 14px; outline: none; font-family: inherit; }
        #search-bar::placeholder { color: var(--secondary-text-color); }

        .custom-select-wrapper { position: relative; user-select: none; border-left: 1px solid var(--control-border-color); width: 130px; }
        .custom-select-trigger { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; font-size: 13px; color: var(--text-color); cursor: pointer; transition: background-color 0.2s ease; border-radius: 0 4px 4px 0; }
        .custom-select-trigger:hover { background-color: var(--hover-color); }
        .custom-select-trigger svg { width: 12px; height: 12px; transition: transform 0.2s ease; }
        .custom-select-wrapper.open .custom-select-trigger svg { transform: rotate(180deg); }

        .custom-options {
            position: absolute; top: calc(100% + 4px); right: 0; width: 180px; background-color: var(--dropdown-bg); border: 1px solid var(--dropdown-border); border-radius: 8px; box-shadow: var(--shadow-flyout); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s cubic-bezier(0.1, 0.9, 0.2, 1); padding: 4px; z-index: 100;
        }
        .custom-select-wrapper.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option { padding: 8px 12px 8px 16px; font-size: 13px; color: var(--text-color); cursor: pointer; border-radius: 4px; margin-bottom: 2px; position: relative; transition: background-color 0.15s ease; }
        .custom-option:last-child { margin-bottom: 0; }
        .custom-option:hover { background-color: var(--hover-color); }
        .custom-option.selected { background-color: var(--hover-color); }
        .custom-option.selected::before { content: ''; position: absolute; left: 4px; top: 50%; transform: translateY(-50%); height: 16px; width: 3px; background-color: var(--accent-color); border-radius: 4px; }

        .icon-maker-button { 
            background-color: var(--accent-color); border: 1px solid transparent; color: var(--accent-text-color); 
            border-radius: 4px; padding: 8px 16px; font-size: 14px; font-weight: 500; text-decoration: none; 
            display: flex; align-items: center; justify-content: center; transition: background-color 0.15s ease; 
            flex-shrink: 0;
        }
        .icon-maker-button:hover { background-color: var(--accent-hover); }
        .icon-maker-button:active { transform: scale(0.98); }


        /* --- FLUENT DIALOG STYLES (GLOBAL) --- */
        .dialog-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease;
            backdrop-filter: blur(2px);
        }
        .dialog-overlay.show { opacity: 1; visibility: visible; }
        .fluent-dialog {
            background-color: var(--dialog-bg); border: 1px solid var(--dialog-border);
            border-radius: 8px; width: 90%; max-width: 480px; box-shadow: var(--shadow-dialog);
            overflow: hidden; transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .dialog-overlay.show .fluent-dialog { transform: scale(1); }
        .fluent-dialog-content { padding: 24px; }
        .fluent-dialog-title { margin: 0 0 12px 0; font-size: 20px; font-weight: 600; }
        .fluent-dialog-body { margin: 0 0 20px 0; font-size: 14px; line-height: 1.5; color: var(--text-color); }
        .fluent-dialog-footer { background-color: var(--dialog-footer-bg); padding: 24px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--dialog-border); }

        .fluent-btn {
            padding: 6px 20px; border-radius: 4px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: background-color 0.15s ease, transform 0.1s ease;
            font-family: inherit; display: inline-flex; align-items: center; justify-content: center;
        }
        .fluent-btn:active { transform: scale(0.96); }
        .fluent-btn-primary { background-color: var(--accent-color); color: var(--accent-text-color); border: 1px solid transparent; }
        .fluent-btn-primary:hover { background-color: var(--accent-hover); }
        .fluent-btn-secondary { background-color: var(--control-bg-color); color: var(--text-color); border: 1px solid var(--control-border-color); }
        .fluent-btn-secondary:hover { background-color: var(--hover-color); }
        .fluent-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .badge-container { display: flex; justify-content: center; margin-top: 16px; }
        .store-badge-link { display: inline-block; transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .store-badge-link:hover { transform: scale(1.05); }

        /* --- AUTHOR DIALOG & TABS --- */
        .fluent-dialog.wide-dialog { max-width: 840px; width: 95%; }
        .author-dialog-header { display: flex; align-items: center; gap: 16px; margin-bottom: 0px; padding-bottom: 0px; }
        .author-dialog-avatar-large { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 1px solid var(--control-border-color); }
        
        .fluent-tabs { display: flex; gap: 24px; margin-top: 20px; margin-bottom: 16px; border-bottom: 1px solid var(--dialog-border); padding: 0 8px; }
        .fluent-tab { background: transparent; border: none; color: var(--secondary-text-color); font-size: 14px; font-weight: 600; padding: 8px 4px; cursor: pointer; position: relative; transition: color 0.2s ease; font-family: inherit; }
        .fluent-tab:hover, .fluent-tab.active { color: var(--text-color); }
        .fluent-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background-color: var(--accent-color); border-radius: 3px 3px 0 0; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeInTab 0.3s ease; }
        @keyframes fadeInTab { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .scrollable-body { max-height: 55vh; overflow-y: auto; padding-right: 8px; margin-right: -8px; margin-bottom: 0; }
        .scrollable-body::-webkit-scrollbar { width: 6px; }
        .scrollable-body::-webkit-scrollbar-track { background: transparent; }
        .scrollable-body::-webkit-scrollbar-thumb { background-color: var(--control-border-color); border-radius: 6px; }

        .author-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin: 0; }

        /* --- ICONS GRID --- */
        main { padding: 24px; }
        .icon-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }

        .icon-item {
            background-color: var(--card-bg-color); padding: 24px 16px 16px 16px; border: 1px solid var(--card-border-color);
            border-radius: 8px; text-align: center; box-shadow: var(--shadow-subtle); position: relative;
            opacity: 0; animation: fadeIn 0.4s forwards ease; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: transform 0.2s ease, background-color 0.2s ease; overflow: hidden; cursor: pointer;
        }
        .icon-item:hover { background-color: var(--hover-color); }

        .author-avatar-link { position: absolute; top: 10px; left: 10px; width: 24px !important; height: 24px !important; z-index: 10; display: inline-block; border-radius: 50%; cursor: pointer; }
        .author-avatar { width: 24px !important; height: 24px !important; border-radius: 50% !important; object-fit: cover !important; border: 1px solid var(--control-border-color); background-color: var(--control-bg-color); }
        .author-avatar-link:hover .author-avatar { box-shadow: var(--shadow-subtle); opacity: 0.9; }
        
        .download-btn, .open-btn { 
            position: absolute; top: 10px; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; background-color: var(--control-bg-color); border: 1px solid var(--control-border-color); border-radius: 4px; color: var(--text-color); cursor: pointer; z-index: 40; transition: background-color 0.15s ease, opacity 0.15s ease; opacity: 0; pointer-events: none; 
        }
        .download-btn svg, .open-btn svg { width: 12px; height: 12px; display: block; color: currentColor; }
        .download-btn { right: 10px; }
        .open-btn { right: 36px; } 
        .icon-item:hover .download-btn, .icon-item:hover .open-btn, .icon-item.selected .download-btn, .icon-item.selected .open-btn { opacity: 1; pointer-events: auto; }
        .download-btn:hover, .open-btn:hover { background-color: var(--hover-color); }
        .download-btn.downloaded { background-color: #107c41; border-color: #107c41; color: #ffffff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .icon-image-container canvas { margin: auto; border-radius: 8px; }

        p.icon-name { font-size: 14px; color: var(--text-color); margin: 12px 0 4px; font-weight: 600; cursor: default; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        /* OVERLAY BLUR */
        .icon-item .details { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; margin: 0; text-align: left; 
            background-color: var(--overlay-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 30; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; 
            justify-content: center; gap: 8px; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; 
        }
        .icon-item.selected .details { opacity: 1; pointer-events: auto; }
        
        .details-text { color: var(--secondary-text-color); font-size: 12px; flex: 0 1 auto; margin-right: 3px; }
        .details-subcontainer { display: flex; align-items: center; width: 100%; font-size: 12px; line-height: 1.4; color: var(--text-color); }
        .details-value { display: flex; align-items: center; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .details-value::before { content: '.........................................................................................................................................................................................................................'; color: var(--secondary-text-color); opacity: 0.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 3px; flex-shrink: 1; }
        
        .author-link { color: var(--accent-color); text-decoration: none; transition: color 0.15s ease; cursor: pointer;}
        .author-link:hover { text-decoration: underline; color: var(--accent-hover); }

        .skeleton-item { background-color: var(--card-bg-color); padding: 16px; border: 1px solid var(--card-border-color); border-radius: 8px; text-align: center; box-shadow: var(--shadow-subtle); }
        .skeleton { background: linear-gradient(90deg, var(--skeleton-dark) 25%, var(--skeleton-light) 50%, var(--skeleton-dark) 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
        .skeleton-image { width: 96px; height: 96px; border-radius: 8px; margin: auto; }
        .skeleton-text { height: 14px; width: 70%; margin: 12px auto 8px; border-radius: 4px; }
        .skeleton-size { height: 12px; width: 40%; margin: 0 auto; border-radius: 4px; }

        #scroll-to-top-btn { position: fixed; bottom: 24px; right: 24px; background-color: var(--control-bg-color); border: 1px solid var(--control-border-color); color: var(--text-color); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 0.2s ease, background-color 0.2s ease; z-index: 1000; box-shadow: var(--shadow-subtle); backdrop-filter: blur(10px); }
        #scroll-to-top-btn:hover { background-color: var(--hover-color); }
        #scroll-to-top-btn.show { opacity: 1; }

        .icon-image-container { position: relative; display: inline-block; transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .icon-item:hover .icon-image-container, .icon-item.selected .icon-image-container { transform: translateY(-4px); }
        .icon-image-container .small-image { position: absolute; bottom: 0px; right: 0px; width: 44px; height: 44px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

    <!-- APP WRAPPER FOR SIDEBAR LAYOUT -->
    <div class="app-container">
        
        <!-- SIDEBAR DENGAN ACCORDION -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="https://github.com/icon11-community" target="_blank" class="github-logo-btn" title="Visit our GitHub">
                    <svg height="20" aria-hidden="true" viewBox="0 0 24 24" version="1.1" width="20" class="octicon octicon-mark-github" fill="currentColor">
                        <path d="M12.5.75C6.146.75 1 5.896 1 12.25c0 5.089 3.292 9.387 7.863 10.91.575.101.79-.244.79-.546 0-.273-.014-1.178-.014-2.142-2.889.532-3.636-.704-3.866-1.35-.13-.331-.69-1.352-1.18-1.625-.402-.216-.977-.748-.014-.762.906-.014 1.553.834 1.769 1.179 1.035 1.74 2.688 1.25 3.349.948.1-.747.402-1.25.733-1.538-2.559-.287-5.232-1.279-5.232-5.678 0-1.25.445-2.285 1.178-3.09-.115-.288-.517-1.467.115-3.048 0 0 .963-.302 3.163 1.179.92-.259 1.897-.388 2.875-.388.977 0 1.955.13 2.875.388 2.2-1.495 3.162-1.179 3.162-1.179.633 1.581.23 2.76.115 3.048.733.805 1.179 1.825 1.179 3.09 0 4.413-2.688 5.39-5.247 5.678.417.36.776 1.05.776 2.128 0 1.538-.014 2.774-.014 3.162 0 .302.216.662.79.547C20.709 21.637 24 17.324 24 12.25 24 5.896 18.854.75 12.5.75Z"></path>
                    </svg>
                </a>
                <h1 class="sidebar-title">Folder11</h1>
            </div>
            
            <div class="sidebar-menu" id="sidebar-menu">
                <!-- Root Item: All Icons -->
                <div class="sidebar-item active" id="btn-all-icons" onclick="selectSidebarAuthor('', this)">
                    <span class="sidebar-item-text">All Icons</span>
                </div>

                <!-- Accordion 1: Authors -->
                <div class="sidebar-section">
                    <div class="sidebar-section-header" onclick="toggleSidebarSection('authors-content', this)">
                        <div class="sidebar-section-header-left">

                                <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect>

        <!-- MAIN CONTENT -->

            <!-- STICKY HEADER -->

                        <input type="text" id="search-bar" placeholder="Search icons...">

    <!-- Floating Button To Top -->

    <!-- Dialogs -->
    <div id="promo-dialog-overlay" class="dialog-overlay">

                <div class="badge-container">
                    <a href="ms-windows-store://pdp/?ProductId=9NN3SBFDK83C" class="store-badge-link" aria-label="Download Fold11 from Microsoft Store">
                        <img src="https://get.microsoft.com/images/en-us%20light.svg" width="200" alt="Microsoft Store Badge"/>
                    </a>

                <button id="close-promo-dialog-btn" class="fluent-btn fluent-btn-primary">Continue to Gallery</button>

    <!-- Fluent Dialog Author Profile -->
    <div id="author-dialog-overlay" class="dialog-overlay">
        <div class="fluent-dialog wide-dialog">
            <div class="fluent-dialog-content" style="padding-bottom: 0;">
                <div class="author-dialog-header">
                    <a href="#" id="author-dialog-link" target="_blank" title="View GitHub Profile">
                        <img id="author-dialog-avatar" src="" alt="Author" class="author-dialog-avatar-large">
                    </a>
                    <div class="author-dialog-info">
                        <h2 id="author-dialog-name" class="fluent-dialog-title" style="margin-bottom: 2px;"></h2>
                        <p id="author-dialog-count" style="margin: 0; font-size: 13px; color: var(--secondary-text-color);"></p>
                    </div>
                </div>
                <div class="fluent-tabs" id="author-tabs">
                    <button class="fluent-tab active" data-tab="current">Current Icons</button>
                    <button class="fluent-tab" data-tab="history">History / Older Versions</button>
                </div>
                <div class="fluent-dialog-body scrollable-body" id="dialog-scroll-area">
                    <div id="author-tab-current" class="tab-pane active">
                        <div id="author-icons-container" class="icon-list author-grid"></div>

                        <div id="author-history-container" class="icon-list author-grid"></div>

    <!-- Fluent Dialog History -->
    <div id="history-dialog-overlay" class="dialog-overlay">
        <div class="fluent-dialog wide-dialog">
            <div class="fluent-dialog-content">
                <h2 id="history-dialog-title" class="fluent-dialog-title">Icon History</h2>
                <div class="fluent-dialog-body scrollable-body">
                    <div id="history-list-container" class="icon-list author-grid"></div>
                </div>
            </div>
            <div class="fluent-dialog-footer">
                <button id="close-history-dialog-btn" class="fluent-btn fluent-btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script>
        const jsonURL = 'https://raw.githubusercontent.com/icon11-community/Folder-Ico/main/Folder11.json';
        let iconsCache = [];
        let currentPage = 0;
        const iconsPerPage = 48;
        let currentSortOption = 'sort';
        let currentSearchTerm = '';
        let currentAuthorFilter = ''; 

        let dialogIconsCache = [];
        let dialogCurrentPage = 0;
        const dialogIconsPerPage = 48;

        let currentActiveAuthor = '';
        let currentExpandedCard = null;

        function debounce(func, delay) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }

        /* --- FUNGSI ACCORDION SIDEBAR --- */
        function toggleSidebarSection(contentId, headerElement) {
            const content = document.getElementById(contentId);
            const arrow = headerElement.querySelector('.section-arrow');
            
            if (content.classList.contains('collapsed')) {
                // Buka
                content.classList.remove('collapsed');
                arrow.classList.add('open');
            } else {
                // Tutup
                content.classList.add('collapsed');
                arrow.classList.remove('open');
            }
        }

        /* --- MENAMPILKAN AUTHOR DI DALAM ACCORDION --- */
        function populateSidebar() {
            const authorsContent = document.getElementById('authors-content');
            authorsContent.innerHTML = '';
            
            document.getElementById('btn-all-icons').classList.add('active');

            const authorCounts = {};
            iconsCache.forEach(icon => {
                if (!icon.is_history) {
                    const author = icon.author_name || 'Community';
                    authorCounts[author] = (authorCounts[author] || 0) + 1;
                }
            });

            const sortedAuthors = Object.keys(authorCounts).sort((a, b) => authorCounts[b] - authorCounts[a]);

            sortedAuthors.forEach(author => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.innerHTML = `
                    <span class="sidebar-item-text" title="${author}">${author}</span>
                    <span class="sidebar-badge">${authorCounts[author]}</span>
                `;
                item.onclick = () => selectSidebarAuthor(author, item);
                authorsContent.appendChild(item);
            });
        }

        /* --- FUNGSI KLIK PADA ITEM SIDEBAR --- */
        function selectSidebarAuthor(author, element) {
            currentAuthorFilter = author;
            
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            filterIcons(currentSearchTerm);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }


        /* --- REUSABLE GRID ITEM BUILDER FOR HISTORY --- */
        function createHistoryItemElement(hIcon, fallbackAuthorName, fallbackAuthorProfile) {
            const iconItem = document.createElement('div');
            iconItem.classList.add('icon-item');
            
            const authorName = hIcon.author_name || fallbackAuthorName || 'Community';
            const authorProfile = hIcon.author_profile || fallbackAuthorProfile || 'https://raw.githubusercontent.com/icon11-community/Folder-Ico/main/ico/folder11.ico';
            const formattedName = formatIconName(hIcon.name);

            const avatarHtml = `
            <div class="author-avatar-link" title="View icons by ${authorName}">
                <img src="${authorProfile}" alt="${authorName}" class="author-avatar" onerror="this.src='https://raw.githubusercontent.com/icon11-community/Folder-Ico/main/ico/folder11.ico'">
            </div>`;

            iconItem.innerHTML = `
                ${avatarHtml}
                <button class="open-btn" title="Open icon in new tab" aria-label="Open icon in new tab">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><path d="M10.0002 5H8.2002C7.08009 5 6.51962 5 6.0918 5.21799C5.71547 5.40973 5.40973 5.71547 5.21799 6.0918C5 6.51962 5 7.08009 5 8.2002V15.8002C5 16.9203 5 17.4801 5.21799 17.9079C5.40973 18.2842 5.71547 18.5905 6.0918 18.7822C6.5192 19 7.07899 19 8.19691 19H15.8031C16.921 19 17.48 19 17.9074 18.7822C18.2837 18.5905 18.5905 18.2839 18.7822 17.9076C19 17.4802 19 16.921 19 15.8031V14M20 9V4M20 4H15M20 4L13 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
                <button class="download-btn" title="Download icon" aria-label="Download icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><path d="M6 21H18M12 3V17M12 17L17 12M12 17L7 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
                <div class="icon-image-container">
                    <canvas width="96" height="96"></canvas>
                    ${hIcon.small_svg_url && hIcon.small_svg_url !== "" ? `<canvas width="44" height="44" class="small-image"></canvas>` : ''}
                </div>
                <p class="icon-name" title="${formattedName}">${formattedName}</p>
                <div class="details">
                    <div class="details-subcontainer">
                        <span class="details-text">Status:</span>
                        <span class="details-value" style="color: var(--secondary-text-color); font-style: italic;">Older Version</span>
                    </div>
                    <div class="details-subcontainer">
                        <span class="details-text">Size:</span>
                        <span class="details-value">${(parseInt(hIcon.size) / (1024 * 1024)).toFixed(2)} MB</span>
                    </div>
                    <div class="details-subcontainer">
                        <span class="details-text">Date:</span>
                        <span class="details-value">${new Date(hIcon.date).toLocaleDateString()}</span>
                    </div>
                </div>
            `;

            const mainCanvas = iconItem.querySelector('canvas');
            const mainCtx = mainCanvas.getContext('2d');
            const mainImg = new Image();
            mainImg.crossOrigin = "Anonymous"; 
            mainImg.onload = () => { mainCtx.drawImage(mainImg, 0, 0, 96, 96); };
            mainImg.src = hIcon.url_icon;

            if (hIcon.small_svg_url) {
                const smallCanvas = iconItem.querySelector('.small-image');
                const smallCtx = smallCanvas.getContext('2d');
                const smallImg = new Image();
                smallImg.crossOrigin = "Anonymous";
                smallImg.onload = () => { smallCtx.drawImage(smallImg, 0, 0, 44, 44); };
                smallImg.src = hIcon.small_svg_url;
            }

            const openBtn = iconItem.querySelector('.open-btn');
            openBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openIcon(hIcon.url_icon);
            });

            const dlBtn = iconItem.querySelector('.download-btn');
            dlBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (dlBtn.disabled) return;
                const originalHTML = dlBtn.innerHTML;
                dlBtn.disabled = true;
                dlBtn.classList.add('disabled');
                const success = await downloadIcon(hIcon.url_icon, hIcon.name + "_history");
                if(success) {
                    dlBtn.classList.add('downloaded');
                    dlBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
                    setTimeout(() => {
                        dlBtn.classList.remove('downloaded');
                        dlBtn.innerHTML = originalHTML;
                        dlBtn.disabled = false;
                        dlBtn.classList.remove('disabled');
                    }, 2000);
                } else {
                    setTimeout(() => { dlBtn.disabled = false; dlBtn.classList.remove('disabled'); }, 1200);
                }
            });

            iconItem.addEventListener('click', () => showDetails(iconItem));
            return iconItem;
        }

        /* --- DIALOG EVENT LISTENERS --- */
        document.addEventListener('DOMContentLoaded', () => {
            const promoDialog = document.getElementById('promo-dialog-overlay');
            const closePromoBtn = document.getElementById('close-promo-dialog-btn');

            setTimeout(() => { promoDialog.classList.add('show'); }, 500);
            closePromoBtn.addEventListener('click', () => promoDialog.classList.remove('show'));
            promoDialog.addEventListener('click', (e) => {
                if(e.target === promoDialog) promoDialog.classList.remove('show');
            });

            const authorDialog = document.getElementById('author-dialog-overlay');
            const closeAuthorBtn = document.getElementById('close-author-dialog-btn');

            closeAuthorBtn.addEventListener('click', () => {
                authorDialog.classList.remove('show');
                document.getElementById('author-icons-container').innerHTML = '';
                document.getElementById('author-history-container').innerHTML = '';
            });
            authorDialog.addEventListener('click', (e) => {
                if(e.target === authorDialog) {
                    authorDialog.classList.remove('show');
                    document.getElementById('author-icons-container').innerHTML = '';
                    document.getElementById('author-history-container').innerHTML = '';
                }
            });

            const tabs = document.querySelectorAll('#author-tabs .fluent-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const targetTab = this.getAttribute('data-tab');
                    switchAuthorTab(targetTab);
                });
            });

            const historyDialog = document.getElementById('history-dialog-overlay');
            const closeHistoryBtn = document.getElementById('close-history-dialog-btn');

            closeHistoryBtn.addEventListener('click', () => {
                historyDialog.classList.remove('show');
                document.getElementById('history-list-container').innerHTML = '';
            });
            historyDialog.addEventListener('click', (e) => {
                if(e.target === historyDialog) {
                    historyDialog.classList.remove('show');
                    document.getElementById('history-list-container').innerHTML = '';
                }
            });

            document.getElementById('dialog-scroll-area').addEventListener('scroll', function() {
                const currentTabActive = document.querySelector('#author-tabs .fluent-tab[data-tab="current"]').classList.contains('active');
                if (currentTabActive) {
                    if (this.scrollTop + this.clientHeight >= this.scrollHeight - 48) {
                        if ((dialogCurrentPage + 1) * dialogIconsPerPage < dialogIconsCache.length) {
                            dialogCurrentPage++;
                            displayDialogIcons();
                        }
                    }
                }
            });
        });

        /* --- SWITCH AUTHOR TAB --- */
        function switchAuthorTab(tabName) {
            document.querySelectorAll('#author-tabs .fluent-tab').forEach(tab => {
                if (tab.getAttribute('data-tab') === tabName) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            document.querySelectorAll('.tab-pane').forEach(pane => {
                if (pane.id === `author-tab-${tabName}`) {
                    pane.classList.add('active');
                } else {
                    pane.classList.remove('active');
                }
            });

            const countEl = document.getElementById('author-dialog-count');
            if (tabName === 'current') {
                countEl.textContent = `${dialogIconsCache.length} current icons`;
            } else {
                const historyCount = document.getElementById('author-history-container').children.length;
                countEl.textContent = `${historyCount} older versions`;
            }
        }

        /* --- HISTORY DIALOG FUNCTION --- */
        function openHistoryDialog(iconName, historyData) {
            const dialog = document.getElementById('history-dialog-overlay');
            dialog.querySelector('.fluent-dialog').classList.add('wide-dialog'); 
            
            const formattedName = formatIconName(iconName);
            document.getElementById('history-dialog-title').textContent = `History: ${formattedName}`;
            
            const container = document.getElementById('history-list-container');
            container.innerHTML = '';
            
            const sortedHistory = historyData.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedHistory.forEach(hIcon => {
                container.appendChild(createHistoryItemElement(hIcon, null, null));
            });
            
            dialog.classList.add('show');
        }

        /* --- AUTHOR DIALOG FUNCTION --- */
        function openAuthorDialog(authorName, authorLink, authorProfile) {
            currentActiveAuthor = authorName;

            document.getElementById('author-dialog-name').textContent = authorName;
            document.getElementById('author-dialog-link').href = authorLink;
            document.getElementById('author-dialog-avatar').src = authorProfile;

            // Current Tab Data
            dialogIconsCache = iconsCache.filter(icon => {
                const iName = icon.author_name || 'Community';
                return iName === authorName && !icon.is_history;
            });
            const currentContainer = document.getElementById('author-icons-container');
            currentContainer.innerHTML = ''; 
            dialogCurrentPage = 0; 
            displayDialogIcons();

            // History Tab Data
            const authorHistoryIcons = iconsCache.filter(icon => {
                const iName = icon.author_name || 'Community';
                return iName === authorName && icon.is_history;
            });
            const histContainer = document.getElementById('author-history-container');
            histContainer.innerHTML = '';
            const sortedHistory = authorHistoryIcons.sort((a, b) => new Date(b.date) - new Date(a.date));
            sortedHistory.forEach(hIcon => {
                histContainer.appendChild(createHistoryItemElement(hIcon, authorName, authorProfile));
            });

            switchAuthorTab('current');
            document.getElementById('author-dialog-overlay').classList.add('show');
        }

        function displayDialogIcons() {
            const container = document.getElementById('author-icons-container');
            const start = dialogCurrentPage * dialogIconsPerPage;
            const end = start + dialogIconsPerPage;
            const iconsToShow = dialogIconsCache.slice(start, end);
            
            iconsToShow.forEach(icon => {
                container.appendChild(createIconElement(icon, false));
            });
        }

        /* --- CUSTOM COMBOBOX LOGIC --- */
        const customSelectWrapper = document.getElementById('custom-sort');
        const customSelectTrigger = customSelectWrapper.querySelector('.custom-select-trigger');
        const customOptions = customSelectWrapper.querySelectorAll('.custom-option');
        const customSelectText = customSelectWrapper.querySelector('.custom-select-text');
        const searchContainer = document.getElementById('search-container');

        customSelectTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            customSelectWrapper.classList.toggle('open');
        });

        const searchInput = document.getElementById('search-bar');
        searchInput.addEventListener('focus', () => searchContainer.classList.add('focus-within'));
        searchInput.addEventListener('blur', () => searchContainer.classList.remove('focus-within'));

        customOptions.forEach(option => {
            option.addEventListener('click', function(e) {
                e.stopPropagation();
                customOptions.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                
                const value = this.getAttribute('data-value');
                customSelectText.textContent = this.textContent;
                customSelectWrapper.classList.remove('open');
                sortIcons(value);
            });
        });

        document.addEventListener('click', (e) => {
            if (!customSelectWrapper.contains(e.target)) customSelectWrapper.classList.remove('open');
        });

        /* --- MAIN GALLERY LOGIC --- */
        window.addEventListener('scroll', () => {
            const scrollToTopBtn = document.getElementById('scroll-to-top-btn');
            if (document.documentElement.scrollTop > 100) scrollToTopBtn.classList.add('show');
            else scrollToTopBtn.classList.remove('show');
        });

        document.getElementById('scroll-to-top-btn').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        async function fetchIcons() {
            displaySkeletons(6, document.getElementById('icons-container'));
            try {
                const response = await fetch(jsonURL);
                const data = await response.json();
                iconsCache = data.icons;
                
                populateSidebar();
                
                const currentIconsCount = iconsCache.filter(i => !i.is_history).length;
                updatePageTitleAndMeta(currentIconsCount);
                
                displayIcons();
            } catch (error) {
                console.error('Error fetching icons:', error);
                clearSkeletons(document.getElementById('icons-container'));
            }
        }

        function filterIcons(searchTerm) {
            currentSearchTerm = searchTerm;
            let filteredIcons = iconsCache.filter(icon => {
                const searchMatch = formatIconName(icon.name).toLowerCase().includes(searchTerm.toLowerCase());
                const authorMatch = currentAuthorFilter === '' || (icon.author_name || 'Community') === currentAuthorFilter;
                return !icon.is_history && searchMatch && authorMatch;
            });
            filteredIcons = sortIconsInternal(filteredIcons, currentSortOption);
            currentPage = 0;
            displayIcons(filteredIcons, true);
        }

        function sortIcons(sortOption) {
            currentSortOption = sortOption;
            filterIcons(currentSearchTerm); 
        }

        function sortIconsInternal(icons, sortOption) {
            switch (sortOption) {
                case 'a-z': return icons.sort((a, b) => formatIconName(a.name).localeCompare(formatIconName(b.name)));
                case 'z-a': return icons.sort((a, b) => formatIconName(b.name).localeCompare(formatIconName(a.name)));
                case 'date-newest': return icons.sort((a, b) => new Date(b.date) - new Date(a.date));
                case 'date-oldest': return icons.sort((a, b) => new Date(a.date) - new Date(b.date));
                default: return icons;
            }
        }

        document.getElementById('search-bar').addEventListener(
            'input', debounce((e) => { filterIcons(e.target.value); }, 300)
        );

        function formatIconCount(count) {
            return count >= 1000 ? `${(count / 1000).toFixed(1)}K` : `${count}`;
        }

        /* --- REUSABLE MAIN ICON GENERATOR --- */
        function createIconElement(icon, showAvatar = true) {
            const iconItem = document.createElement('div');
            iconItem.classList.add('icon-item');
            
            const authorName = icon.author_name || 'Community';
            const authorLink = icon.author_link || icon.author || 'https://github.com/icon11-community';
            const authorProfile = icon.author_profile || 'https://raw.githubusercontent.com/icon11-community/Folder-Ico/main/ico/folder11.ico';
            const formattedName = formatIconName(icon.name);

            const historyData = iconsCache.filter(h => h.name === icon.name && h.is_history === true);
            let historyHtml = '';
            
            if (historyData.length > 0) {
                historyHtml = `
                <div class="details-subcontainer">
                    <span class="details-text">History:</span>
                    <span class="details-value">
                        <a href="#" class="author-link history-trigger-link" onclick="event.stopPropagation()">${historyData.length} older version(s)</a>
                    </span>
                </div>`;
            } else {
                historyHtml = `
                <div class="details-subcontainer">
                    <span class="details-text">History:</span>
                    <span class="details-value" style="color: var(--secondary-text-color); font-weight: 400;">No history</span>
                </div>`;
            }

            let avatarHtml = '';
            if (showAvatar) {
                avatarHtml = `
                <div class="author-avatar-link" title="View icons by ${authorName}" role="button">
                    <img src="${authorProfile}" alt="${authorName}" class="author-avatar" onerror="this.src='https://raw.githubusercontent.com/icon11-community/Folder-Ico/main/ico/folder11.ico'">
                </div>`;
            }

            iconItem.innerHTML = `
                ${avatarHtml}
                <button class="open-btn" title="Open icon in new tab" aria-label="Open icon in new tab">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><path d="M10.0002 5H8.2002C7.08009 5 6.51962 5 6.0918 5.21799C5.71547 5.40973 5.40973 5.71547 5.21799 6.0918C5 6.51962 5 7.08009 5 8.2002V15.8002C5 16.9203 5 17.4801 5.21799 17.9079C5.40973 18.2842 5.71547 18.5905 6.0918 18.7822C6.5192 19 7.07899 19 8.19691 19H15.8031C16.921 19 17.48 19 17.9074 18.7822C18.2837 18.5905 18.5905 18.2839 18.7822 17.9076C19 17.4802 19 16.921 19 15.8031V14M20 9V4M20 4H15M20 4L13 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
                <button class="download-btn" title="Download icon" aria-label="Download icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><path d="M6 21H18M12 3V17M12 17L17 12M12 17L7 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
                <div class="icon-image-container">
                    <canvas width="96" height="96"></canvas>
                    ${icon.small_svg_url && icon.small_svg_url !== "" ? `<canvas width="44" height="44" class="small-image"></canvas>` : ''}
                </div>
                <p class="icon-name" title="${formattedName}">${formattedName}</p>
                <div class="details">
                    <div class="details-subcontainer">
                        <span class="details-text">Size:</span>
                        <span class="details-value">${(parseInt(icon.size) / (1024 * 1024)).toFixed(2)} MB</span>
                    </div>
                    <div class="details-subcontainer">
                        <span class="details-text">Date:</span>
                        <span class="details-value">${new Date(icon.date).toLocaleDateString()}</span>
                    </div>
                    <div class="details-subcontainer">
                        <span class="details-text">Author:</span>
                        <span class="details-value">
                            <a href="${authorLink}" target="_blank" class="author-link" onclick="event.stopPropagation()">${authorName}</a>
                        </span>
                    </div>
                    ${historyHtml}
                </div>
            `;

            const mainCanvas = iconItem.querySelector('canvas');
            const mainCtx = mainCanvas.getContext('2d');
            const mainImg = new Image();
            mainImg.crossOrigin = "Anonymous"; 
            mainImg.onload = () => { mainCtx.drawImage(mainImg, 0, 0, 96, 96); };
            mainImg.src = icon.url_icon;

            if (icon.small_svg_url) {
                const smallCanvas = iconItem.querySelector('.small-image');
                const smallCtx = smallCanvas.getContext('2d');
                const smallImg = new Image();
                smallImg.crossOrigin = "Anonymous";
                smallImg.onload = () => { smallCtx.drawImage(smallImg, 0, 0, 44, 44); };
                smallImg.src = icon.small_svg_url;
            }

            if (showAvatar) {
                const avatarBtn = iconItem.querySelector('.author-avatar-link');
                if (avatarBtn) {
                    avatarBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openAuthorDialog(authorName, authorLink, authorProfile);
                    });
                }
            }

            const historyLinkBtn = iconItem.querySelector('.history-trigger-link');
            if(historyLinkBtn) {
                historyLinkBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    openHistoryDialog(icon.name, historyData);
                });
            }

            const dlBtn = iconItem.querySelector('.download-btn');
            if (dlBtn) {
                dlBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (dlBtn.disabled) return;
                    dlBtn.disabled = true;
                    dlBtn.classList.add('disabled');
                    const originalHTML = dlBtn.innerHTML;
                    const success = await downloadIcon(icon.url_icon, icon.name);
                    if (success) {
                        dlBtn.classList.add('downloaded');
                        dlBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
                        setTimeout(() => {
                            dlBtn.classList.remove('downloaded');
                            dlBtn.innerHTML = originalHTML;
                            dlBtn.disabled = false;
                            dlBtn.classList.remove('disabled');
                        }, 2000);
                    } else {
                        setTimeout(() => { dlBtn.disabled = false; dlBtn.classList.remove('disabled'); }, 1200);
                    }
                });
            }

            const openBtn = iconItem.querySelector('.open-btn');
            if (openBtn) {
                openBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openIcon(icon.url_icon);
                });
            }

            iconItem.addEventListener('click', () => showDetails(iconItem));

            return iconItem;
        }

        function displayIcons(filteredIcons = iconsCache.filter(i => !i.is_history), replaceContent = false) {
            const container = document.getElementById('icons-container');
            if (replaceContent) container.innerHTML = '';
            
            displaySkeletons(6, container);
            const start = currentPage * iconsPerPage;
            const end = start + iconsPerPage;
            const iconsToShow = filteredIcons.slice(start, end);
            
            setTimeout(() => {
                iconsToShow.forEach(icon => {
                    container.appendChild(createIconElement(icon, true));
                });
                clearSkeletons(container);
            }, 500);
        }

        function showDetails(iconItem) {
            if (currentExpandedCard === iconItem) {
                iconItem.classList.remove('selected');
                currentExpandedCard = null;
                return;
            }

            if (currentExpandedCard) {
                currentExpandedCard.classList.remove('selected');
            }

            iconItem.classList.add('selected');
            currentExpandedCard = iconItem;
        }

        function displaySkeletons(count, container) {
            for (let i = 0; i < count; i++) {
                const skeletonItem = document.createElement('div');
                skeletonItem.classList.add('skeleton-item');
                skeletonItem.innerHTML = `
                    <div class="skeleton skeleton-image"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-size"></div>
                `;
                container.appendChild(skeletonItem);
            }
        }

        function clearSkeletons(container) {
            const skeletons = container.querySelectorAll('.skeleton-item');
            skeletons.forEach(skeleton => skeleton.remove());
        }

        function formatIconName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, char => char.toUpperCase());
        }

        function openIcon(url) { window.open(url, '_blank'); }

        function getExtensionFromUrl(url) {
            try { return new URL(url).pathname.match(/\.[a-zA-Z0-9]+$/)?.[0] || ''; } 
            catch (e) { return ''; }
        }

        async function downloadIcon(url, name) {
            try {
                const response = await fetch(url, { mode: 'cors' });
                if (!response.ok) throw new Error('Network response was not ok');
                const blob = await response.blob();
                const ext = getExtensionFromUrl(url) || '';
                const filename = `${name}${ext}`;
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(blobUrl);
                return true;
            } catch (error) {
                console.error('Download failed, opening in new tab instead:', error);
                try { window.open(url, '_blank'); } catch (e) { console.error('Fallback open failed', e); }
                return false;
            }
        }

        window.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            if (scrollTop + clientHeight >= scrollHeight - 48) {
                let filteredIcons = iconsCache.filter(icon => {
                    const searchMatch = formatIconName(icon.name).toLowerCase().includes(currentSearchTerm.toLowerCase());
                    const authorMatch = currentAuthorFilter === '' || (icon.author_name || 'Community') === currentAuthorFilter;
                    return !icon.is_history && searchMatch && authorMatch;
                });
                filteredIcons = sortIconsInternal(filteredIcons, currentSortOption);
                if ((currentPage + 1) * iconsPerPage < filteredIcons.length) {
                    currentPage++;
                    displayIcons(filteredIcons);
                }
            }
        });

        function updatePageTitleAndMeta(totalIcons) {
            const searchBar = document.getElementById('search-bar');
            searchBar.placeholder = `Search ${formatIconCount(totalIcons)} icons...`;
            document.title = `Over ${formatIconCount(totalIcons)} icons Folder11 for Windows`;
        }

        fetchIcons();
    </script>
</body>
</html>
